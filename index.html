<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohi Market</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{background:#f5f5f5}

/* HEADER */
header{
background:#7000ff;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
position:sticky;
top:0;
}

.logo{font-size:28px;font-weight:bold}

.search{
width:35%;
padding:10px;
border:none;
border-radius:8px;
}

/* LAYOUT */
.container{
display:flex;
gap:20px;
padding:20px;
}

/* PRODUCTS */
.products{
flex:3;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{width:100%;height:180px;object-fit:cover;border-radius:10px}

.price{color:#7000ff;font-weight:bold;margin-top:8px}

button{
width:100%;
margin-top:10px;
padding:10px;
background:#7000ff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* CART PANEL */
.cartPanel{
flex:1;
background:white;
padding:15px;
border-radius:12px;
height:fit-content;
position:sticky;
top:80px;
}

.cartItem{
display:flex;
justify-content:space-between;
margin:10px 0;
font-size:14px;
}

.removeBtn{
background:red;
padding:5px;
font-size:12px;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.total{
margin-top:15px;
font-weight:bold;
font-size:18px;
color:#7000ff;
}
</style>
</head>

<body>

<header>
<div class="logo">MOHI MARKET</div>
<input class="search" id="search" placeholder="Qidirish...">
<div>🛒 <span id="cartCount">0</span></div>
</header>

<div class="container">

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cartPanel">
<h3>Savatcha</h3>
<div id="cartList"></div>
<div class="total">Jami: <span id="totalPrice">0</span> so'm</div>
</div>

</div>

<script>

// PRODUCTS
const products = [
{id:1,name:"iPhone 15 Pro",price:15000000,image:"https://picsum.photos/300/200?1"},
{id:2,name:"Samsung S24",price:11000000,image:"https://picsum.photos/300/200?2"},
{id:3,name:"MacBook Air",price:18000000,image:"https://picsum.photos/300/200?3"},
{id:4,name:"AirPods Pro",price:2500000,image:"https://picsum.photos/300/200?4"},
{id:5,name:"Smart TV",price:6000000,image:"https://picsum.photos/300/200?5"},
{id:6,name:"PS5",price:8500000,image:"https://picsum.photos/300/200?6"}
];

// CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// SAVE CART
function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
}

// SHOW PRODUCTS
const productsDiv = document.getElementById("products");

function showProducts(list){
productsDiv.innerHTML = "";

list.forEach(p => {
productsDiv.innerHTML += `
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<div class="price">${p.price} so'm</div>
<button onclick="addToCart(${p.id})">Savatchaga</button>
</div>
`;
});
}

showProducts(products);

// ADD TO CART
function addToCart(id){
let product = products.find(p => p.id === id);
cart.push(product);
saveCart();
renderCart();
}

// REMOVE
function removeFromCart(index){
cart.splice(index,1);
saveCart();
renderCart();
}

// RENDER CART
function renderCart(){

document.getElementById("cartCount").innerText = cart.length;

let cartList = document.getElementById("cartList");
cartList.innerHTML = "";

let total = 0;

cart.forEach((item, index) => {
total += item.price;

cartList.innerHTML += `
<div class="cartItem">
<span>${item.name}</span>
<button class="removeBtn" onclick="removeFromCart(${index})">X</button>
</div>
`;
});

document.getElementById("totalPrice").innerText = total;
}

// SEARCH
document.getElementById("search").addEventListener("keyup", function(){
let val = this.value.toLowerCase();

let filtered = products.filter(p =>
p.name.toLowerCase().includes(val)
);

showProducts(filtered);
});

// INIT
renderCart();

</script>

</body>
</html>
