<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohi Market</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#7000ff;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
position:sticky;
top:0;
}

.logo{
font-size:28px;
font-weight:bold;
}

.search{
width:40%;
padding:10px;
border:none;
border-radius:8px;
}

.cart{
font-size:20px;
font-weight:bold;
}

.banner{
height:250px;
background:linear-gradient(135deg,#7000ff,#9b59ff);
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:40px;
font-weight:bold;
}

.products{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin-top:10px;
}

.price{
color:#7000ff;
font-weight:bold;
font-size:20px;
margin-top:8px;
}

button{
width:100%;
margin-top:10px;
padding:10px;
background:#7000ff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:.9;
}
</style>
</head>
<body>

<header>
<div class="logo">MOHI MARKET</div>

<input
class="search"
type="text"
id="search"
placeholder="Mahsulot qidirish..."
>

<div class="cart">
🛒 <span id="cartCount">0</span>
</div>
</header>

<div class="banner">
Katta Chegirmalar
</div>

<div class="products" id="products"></div>

<script>

const products = [

{
name:"iPhone 15 Pro",
price:"15 000 000",
image:"https://picsum.photos/300/200?1"
},

{
name:"Samsung S24",
price:"11 000 000",
image:"https://picsum.photos/300/200?2"
},

{
name:"MacBook Air",
price:"18 000 000",
image:"https://picsum.photos/300/200?3"
},

{
name:"AirPods Pro",
price:"2 500 000",
image:"https://picsum.photos/300/200?4"
},

{
name:"Smart TV",
price:"6 000 000",
image:"https://picsum.photos/300/200?5"
},

{
name:"PlayStation 5",
price:"8 500 000",
image:"https://picsum.photos/300/200?6"
}

];

let cart = 0;

const productsDiv =
document.getElementById("products");

function showProducts(list){

productsDiv.innerHTML="";

list.forEach(product=>{

productsDiv.innerHTML += `
<div class="card">

<img src="${product.image}">

<h3>${product.name}</h3>

<div class="price">
${product.price} so'm
</div>

<button onclick="addToCart()">
Savatchaga qo'shish
</button>

</div>
`;

});

}

showProducts(products);

function addToCart(){

cart++;

document.getElementById("cartCount")
.innerText = cart;

}

document
.getElementById("search")
.addEventListener("keyup", function(){

let value =
this.value.toLowerCase();

let filtered =
products.filter(product =>
product.name.toLowerCase()
.includes(value)
);

showProducts(filtered);

});

</script>

</body>
</html>
